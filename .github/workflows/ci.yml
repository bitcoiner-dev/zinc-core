name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        command:
          - cargo test
          - cargo check --no-default-features
          - cargo check --features debug
          - cargo package --allow-dirty

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run ${{ matrix.command }}
        run: ${{ matrix.command }}
